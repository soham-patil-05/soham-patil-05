<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" width="900" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .name { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 36px; font-weight: 700; fill: #e6edf3; letter-spacing: -1px; }
      .sub  { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; font-weight: 400; fill: #8b949e; letter-spacing: 2px; }
      .tag  { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; font-weight: 400; fill: #3fb950; }
      .line { stroke: #21262d; stroke-width: 1; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .blink { animation: blink 1.2s step-end infinite; }
      .slide-in { animation: slideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .fade-in-1 { animation: fadeIn 0.8s ease 0.3s forwards; opacity: 0; }
      .fade-in-2 { animation: fadeIn 0.8s ease 0.6s forwards; opacity: 0; }
      .fade-in-3 { animation: fadeIn 0.8s ease 0.9s forwards; opacity: 0; }
      .draw { stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 2s ease 0.5s forwards; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
    <!-- scan line grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="900" height="160" fill="#0d1117"/>
  <rect width="900" height="160" fill="url(#grid)" opacity="0.5"/>

  <!-- left accent bar animated -->
  <rect x="36" y="28" width="3" height="104" fill="#58a6ff" rx="2" class="pulse"/>

  <!-- telemetry graph lines — decorative right side -->
  <polyline points="620,120 650,100 670,110 700,75 730,85 760,60 790,70 820,50 860,65 890,45"
    fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.3" class="draw"/>
  <polyline points="620,130 650,115 670,125 700,95 730,108 760,82 790,95 820,72 860,88 890,68"
    fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.2" class="draw"/>

  <!-- top meta line -->
  <text x="50" y="46" class="tag fade-in-1">SOHAM_PATIL.SYS  //  PICT · IT · 9.14  //  STATUS: ACTIVE</text>

  <!-- main name -->
  <text x="50" y="95" class="name slide-in">SOHAM PATIL<tspan fill="#58a6ff" class="blink">_</tspan></text>

  <!-- role line -->
  <text x="52" y="120" class="sub fade-in-2">SDE INTERN  ·  AI &amp; DISTRIBUTED SYSTEMS  ·  BACKEND INFRASTRUCTURE</text>

  <!-- bottom tag line -->
  <text x="52" y="143" class="tag fade-in-3">[ kafka ]  [ gemini-react-agent ]  [ docker ]  [ redis ]  [ websockets ]  [ llm-toolcalling ]</text>

  <!-- right corner decoration -->
  <text x="862" y="143" class="tag" text-anchor="end" opacity="0.4" font-size="10">v2025.build</text>
</svg>
