<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" role="img" aria-labelledby="title desc">
  <title id="title">Signal metrics console</title>
  <desc id="desc">A high contrast console with contest ratings, runtime metrics, and build constraints.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; }
      @keyframes ring { to { stroke-dashoffset: 0; } }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
      @keyframes scan { 0% { transform: translateY(-120px); } 100% { transform: translateY(780px); } }
      .draw { animation: ring 1.9s cubic-bezier(.16,1,.3,1) both; }
      .blink { animation: blink 1s steps(1,end) infinite; }
      .scan { animation: scan 5s linear infinite; }
    </style>
    <pattern id="matrix" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#ffffff" stroke-width="1" opacity=".08"/>
    </pattern>
  </defs>

  <rect width="720" height="760" fill="#050505"/>
  <rect width="720" height="760" fill="url(#matrix)"/>
  <rect x="24" y="24" width="672" height="712" fill="none" stroke="#ffffff" stroke-width="4"/>
  <rect x="42" y="42" width="636" height="64" fill="#fbff00"/>
  <text x="62" y="84" class="heavy" font-size="34" fill="#050505">SIGNAL STACK</text>
  <rect x="552" y="56" width="28" height="28" fill="#ff2bd6" class="blink"/>
  <rect x="592" y="56" width="28" height="28" fill="#00e5ff"/>
  <rect x="632" y="56" width="28" height="28" fill="#1cff62" class="blink"/>

  <g transform="translate(62 154)">
    <text x="0" y="0" class="mono" font-size="17" font-weight="900" fill="#ffffff">contest pressure</text>
    <line x1="0" y1="18" x2="596" y2="18" stroke="#ff2bd6" stroke-width="4"/>
  </g>

  <g transform="translate(128 268)">
    <circle cx="0" cy="0" r="82" fill="none" stroke="#222" stroke-width="18"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#fbff00" stroke-width="18" stroke-linecap="square" stroke-dasharray="395 515" stroke-dashoffset="395" class="draw"/>
    <text x="0" y="-8" text-anchor="middle" class="mono" font-size="36" font-weight="900" fill="#ffffff">1923</text>
    <text x="0" y="24" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#fbff00">leetcode</text>
    <text x="0" y="48" text-anchor="middle" class="mono" font-size="13" font-weight="900" fill="#ffffff">knight</text>
  </g>

  <g transform="translate(360 268)">
    <circle cx="0" cy="0" r="82" fill="none" stroke="#222" stroke-width="18"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#00e5ff" stroke-width="18" stroke-linecap="square" stroke-dasharray="335 515" stroke-dashoffset="335" class="draw"/>
    <text x="0" y="-8" text-anchor="middle" class="mono" font-size="36" font-weight="900" fill="#ffffff">1638</text>
    <text x="0" y="24" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#00e5ff">codechef</text>
    <text x="0" y="48" text-anchor="middle" class="mono" font-size="13" font-weight="900" fill="#ffffff">3 star</text>
  </g>

  <g transform="translate(592 268)">
    <circle cx="0" cy="0" r="82" fill="none" stroke="#222" stroke-width="18"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#1cff62" stroke-width="18" stroke-linecap="square" stroke-dasharray="282 515" stroke-dashoffset="282" class="draw"/>
    <text x="0" y="-8" text-anchor="middle" class="mono" font-size="36" font-weight="900" fill="#ffffff">1380</text>
    <text x="0" y="24" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#1cff62">codeforces</text>
    <text x="0" y="48" text-anchor="middle" class="mono" font-size="13" font-weight="900" fill="#ffffff">pupil</text>
  </g>

  <g transform="translate(62 430)" class="mono" font-weight="900">
    <text x="0" y="0" font-size="17" fill="#ffffff">runtime counters</text>
    <line x1="0" y1="18" x2="596" y2="18" stroke="#00e5ff" stroke-width="4"/>
    <g transform="translate(0 58)">
      <rect width="596" height="42" fill="#ffffff"/>
      <rect width="438" height="42" fill="#ff2bd6"/>
      <text x="16" y="28" font-size="16" fill="#050505">async queue capacity</text>
      <text x="520" y="28" font-size="18" fill="#050505">4096</text>
    </g>
    <g transform="translate(0 122)">
      <rect width="596" height="42" fill="#ffffff"/>
      <rect width="356" height="42" fill="#fbff00"/>
      <text x="16" y="28" font-size="16" fill="#050505">capture latency target</text>
      <text x="502" y="28" font-size="18" fill="#050505">sub-10s</text>
    </g>
    <g transform="translate(0 186)">
      <rect width="596" height="42" fill="#ffffff"/>
      <rect width="498" height="42" fill="#1cff62"/>
      <text x="16" y="28" font-size="16" fill="#050505">reconciliation invariant</text>
      <text x="514" y="28" font-size="18" fill="#050505">3-&gt;1</text>
    </g>
    <g transform="translate(0 250)">
      <rect width="596" height="42" fill="#ffffff"/>
      <rect width="294" height="42" fill="#00e5ff"/>
      <text x="16" y="28" font-size="16" fill="#050505">vision blob storage</text>
      <text x="548" y="28" font-size="18" fill="#050505">0</text>
    </g>
  </g>

  <rect class="scan" x="24" y="0" width="672" height="68" fill="#ffffff" opacity=".12"/>
</svg>
