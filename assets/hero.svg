<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Soham Patil voltage index</title>
  <desc id="desc">A bright retro-futuristic profile artifact with build proof, system traces, and neon console panels.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; letter-spacing: 1px; }
      .tiny { font-size: 14px; }
      @keyframes sweep { 0% { transform: translateX(-360px); opacity: 0; } 12% { opacity: .9; } 60% { opacity: .55; } 100% { transform: translateX(1220px); opacity: 0; } }
      @keyframes dash { to { stroke-dashoffset: -120; } }
      @keyframes blink { 0%, 52%, 100% { opacity: 1; } 53%, 78% { opacity: .18; } }
      @keyframes crawl { to { transform: translateX(-160px); } }
      @keyframes throb { 0%, 100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.08); opacity: 1; } }
      .scan { animation: sweep 5.8s linear infinite; }
      .dash { stroke-dasharray: 18 12; animation: dash 3.2s linear infinite; }
      .blink { animation: blink 1.1s steps(1,end) infinite; }
      .crawl { animation: crawl 9s linear infinite; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: throb 1.4s ease-in-out infinite; }
    </style>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#050505" stroke-width="1" opacity=".24"/>
      <path d="M0 21H42M21 0V42" fill="none" stroke="#050505" stroke-width=".7" opacity=".11"/>
    </pattern>
    <pattern id="slashes" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(24)">
      <rect width="16" height="56" fill="#050505"/>
      <rect x="16" width="12" height="56" fill="#ff2bd6"/>
      <rect x="28" width="28" height="56" fill="#fbff00"/>
    </pattern>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .17"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="#fbff00"/>
  <rect width="1200" height="620" fill="url(#grid)"/>
  <rect width="1200" height="620" filter="url(#rough)" opacity=".35"/>

  <path d="M0 0H1200V92L0 190Z" fill="#00e5ff"/>
  <path d="M1200 0V246L744 112L812 0Z" fill="#ff2bd6"/>
  <path d="M0 458L544 540L1200 410V620H0Z" fill="#ffffff"/>
  <path d="M0 506H1200V620H0Z" fill="url(#slashes)" opacity=".95"/>

  <g class="crawl" opacity=".84">
    <text x="0" y="35" class="mono" font-size="18" font-weight="800" fill="#050505">BUILD // BREAK // SHIP // TRACE // RECOVER // BUILD // BREAK // SHIP // TRACE // RECOVER // BUILD //</text>
    <text x="1280" y="35" class="mono" font-size="18" font-weight="800" fill="#050505">BUILD // BREAK // SHIP // TRACE // RECOVER // BUILD // BREAK // SHIP //</text>
  </g>

  <g transform="translate(54 72)">
    <rect x="0" y="0" width="520" height="34" fill="#050505"/>
    <rect x="9" y="8" width="92" height="18" fill="#1cff62"/>
    <text x="118" y="23" class="mono tiny" font-weight="900" fill="#fbff00">profile.boot --proof-first --no-template</text>
  </g>

  <g transform="translate(54 138)">
    <text x="12" y="78" class="heavy" font-size="118" fill="#00e5ff">SOHAM</text>
    <text x="4" y="68" class="heavy" font-size="118" fill="#050505">SOHAM</text>
    <text x="10" y="190" class="heavy" font-size="116" fill="#ff2bd6">PATIL</text>
    <text x="0" y="180" class="heavy" font-size="116" fill="none" stroke="#050505" stroke-width="4">PATIL</text>
    <text x="7" y="232" class="mono" font-size="19" font-weight="900" fill="#050505">systems / agents / infra / contest signal</text>
    <rect x="0" y="254" width="510" height="14" fill="#050505"/>
    <rect x="0" y="274" width="286" height="14" fill="#ff2bd6"/>
    <rect x="300" y="274" width="210" height="14" fill="#00e5ff"/>
  </g>

  <g transform="translate(664 84)">
    <polygon points="0,0 480,24 436,396 -28,366" fill="#050505" stroke="#ffffff" stroke-width="5"/>
    <polygon points="20,24 448,43 414,362 -4,335" fill="#101010" stroke="#fbff00" stroke-width="2"/>
    <text x="38" y="72" class="mono" font-size="18" font-weight="900" fill="#fbff00">BUILD PROOF / MAIN</text>
    <text x="38" y="104" class="mono" font-size="14" font-weight="700" fill="#00e5ff">runtime traces, not adjectives</text>
    <line x1="38" y1="126" x2="396" y2="126" stroke="#ff2bd6" stroke-width="3" class="dash"/>

    <g class="mono" font-size="16" font-weight="800">
      <text x="38" y="166" fill="#ffffff">kafka[3] -&gt; deterministic ledger</text>
      <text x="38" y="204" fill="#ffffff">async queue[4096] -&gt; oldest drop</text>
      <text x="38" y="242" fill="#ffffff">sqlite buffer -&gt; websocket drain</text>
      <text x="38" y="280" fill="#ffffff">edge fn -&gt; vision json -&gt; no blobs</text>
      <text x="38" y="318" fill="#1cff62">AES-256-GCM // Redis // Playwright</text>
    </g>

    <g transform="translate(322 148)">
      <circle cx="0" cy="0" r="13" fill="#fbff00" class="pulse"/>
      <circle cx="78" cy="38" r="13" fill="#00e5ff" class="pulse"/>
      <circle cx="22" cy="116" r="13" fill="#ff2bd6" class="pulse"/>
      <circle cx="96" cy="164" r="13" fill="#1cff62" class="pulse"/>
      <path d="M0 0L78 38L22 116L96 164" fill="none" stroke="#ffffff" stroke-width="3" class="dash"/>
    </g>
  </g>

  <g transform="translate(56 468)">
    <rect x="0" y="0" width="188" height="74" fill="#050505"/>
    <rect x="14" y="13" width="160" height="14" fill="#fbff00"/>
    <text x="14" y="55" class="mono" font-size="24" font-weight="900" fill="#ffffff">3 -&gt; 1</text>
    <text x="88" y="55" class="mono" font-size="14" font-weight="800" fill="#00e5ff">streams</text>

    <rect x="208" y="-18" width="214" height="92" fill="#ff2bd6" stroke="#050505" stroke-width="5"/>
    <text x="226" y="22" class="mono" font-size="36" font-weight="900" fill="#050505">4096</text>
    <text x="228" y="53" class="mono" font-size="14" font-weight="900" fill="#050505">queue capacity</text>

    <rect x="444" y="0" width="190" height="74" fill="#00e5ff" stroke="#050505" stroke-width="5"/>
    <text x="462" y="44" class="mono" font-size="28" font-weight="900" fill="#050505">sub-10s</text>
    <text x="464" y="63" class="mono" font-size="12" font-weight="900" fill="#050505">capture latency</text>
  </g>

  <rect class="scan" x="0" y="0" width="160" height="620" fill="#ffffff" opacity=".28"/>
  <rect x="1126" y="520" width="22" height="22" fill="#1cff62" class="blink"/>
  <rect x="1158" y="520" width="22" height="22" fill="#050505"/>
</svg>
