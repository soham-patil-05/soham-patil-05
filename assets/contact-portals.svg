<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Contact portals</title>
  <desc id="desc">Animated neon contact section with gaming style portals for GitHub, LinkedIn, LeetCode, and conversation.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.22; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
      .spin { transform-box: fill-box; transform-origin: center; animation: spin 10s linear infinite; }
      .blink { animation: blink 1.1s steps(1,end) infinite; }
      .float { animation: float 2.4s ease-in-out infinite; }
      .dash { stroke-dasharray: 18 12; animation: dash 4s linear infinite; }
    </style>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#050505" stroke-width="1" opacity=".18"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" fill="#fffdf7"/>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <path d="M0 0H1200V92L0 180Z" fill="#1cff62"/>
  <path d="M1200 520H690L1200 286Z" fill="#fbff00"/>
  <path d="M0 520V356L334 520Z" fill="#ff2bd6"/>
  <rect x="28" y="28" width="1144" height="464" fill="none" stroke="#050505" stroke-width="6"/>

  <text x="56" y="88" class="heavy" font-size="48" fill="#050505">CONTACT PORTALS</text>
  <text x="58" y="124" class="mono" font-size="17" font-weight="900" fill="#050505">send a signal, trade ideas, challenge a build, or just say something interesting</text>

  <g transform="translate(102 216)">
    <g class="float">
      <circle cx="86" cy="86" r="78" fill="#050505" stroke="#fbff00" stroke-width="8"/>
      <circle cx="86" cy="86" r="52" fill="none" stroke="#ffffff" stroke-width="4" class="spin" stroke-dasharray="18 14"/>
      <text x="86" y="82" text-anchor="middle" class="mono" font-size="24" font-weight="900" fill="#ffffff">GIT</text>
      <text x="86" y="112" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#fbff00">source trail</text>
    </g>
  </g>

  <g transform="translate(374 216)">
    <g class="float">
      <circle cx="86" cy="86" r="78" fill="#050505" stroke="#00e5ff" stroke-width="8"/>
      <circle cx="86" cy="86" r="52" fill="none" stroke="#ffffff" stroke-width="4" class="spin" stroke-dasharray="18 14"/>
      <text x="86" y="82" text-anchor="middle" class="mono" font-size="24" font-weight="900" fill="#ffffff">LINK</text>
      <text x="86" y="112" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#00e5ff">conversation</text>
    </g>
  </g>

  <g transform="translate(646 216)">
    <g class="float">
      <circle cx="86" cy="86" r="78" fill="#050505" stroke="#ff2bd6" stroke-width="8"/>
      <circle cx="86" cy="86" r="52" fill="none" stroke="#ffffff" stroke-width="4" class="spin" stroke-dasharray="18 14"/>
      <text x="86" y="82" text-anchor="middle" class="mono" font-size="24" font-weight="900" fill="#ffffff">LC</text>
      <text x="86" y="112" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#ff2bd6">arena logs</text>
    </g>
  </g>

  <g transform="translate(918 216)">
    <g class="float">
      <circle cx="86" cy="86" r="78" fill="#050505" stroke="#1cff62" stroke-width="8"/>
      <circle cx="86" cy="86" r="52" fill="none" stroke="#ffffff" stroke-width="4" class="spin" stroke-dasharray="18 14"/>
      <text x="86" y="82" text-anchor="middle" class="mono" font-size="24" font-weight="900" fill="#ffffff">IDEA</text>
      <text x="86" y="112" text-anchor="middle" class="mono" font-size="15" font-weight="900" fill="#1cff62">spawn point</text>
    </g>
  </g>

  <path d="M188 302H460H732H1004" fill="none" stroke="#050505" stroke-width="5" class="dash"/>

  <g class="mono" font-size="17" font-weight="900">
    <text x="88" y="448" fill="#050505">github.com/soham-patil-05</text>
    <text x="430" y="448" fill="#050505">linkedin.com/in/soham-patil-27a9b2287</text>
    <text x="862" y="448" fill="#050505">leetcode.com/u/sompatil2005</text>
  </g>
  <rect x="1110" y="68" width="24" height="24" fill="#050505" class="blink"/>
</svg>
