<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Build receipts proof grid</title>
  <desc id="desc">Four high-contrast proof panels listing architecture decisions and implementation receipts.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; }
      @keyframes dash { to { stroke-dashoffset: -160; } }
      @keyframes pop { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .dash { stroke-dasharray: 14 10; animation: dash 3s linear infinite; }
      .pop { transform-box: fill-box; transform-origin: center; animation: pop 1.6s ease-in-out infinite; }
    </style>
    <pattern id="raster" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#fffdf7"/>
      <path d="M0 0H18M0 9H18M0 18H18" stroke="#050505" stroke-width=".6" opacity=".15"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="url(#raster)"/>
  <rect x="24" y="24" width="1152" height="712" fill="none" stroke="#050505" stroke-width="6"/>
  <rect x="24" y="24" width="1152" height="80" fill="#050505"/>
  <text x="52" y="78" class="heavy" font-size="42" fill="#ffffff">BUILD RECEIPTS</text>
  <text x="548" y="72" class="mono" font-size="17" font-weight="900" fill="#fbff00">less biography / more invariants / failure paths included</text>

  <g transform="translate(54 142)">
    <rect width="520" height="248" fill="#fbff00" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="520" height="40" fill="#050505"/>
    <text x="18" y="27" class="mono" font-size="15" font-weight="900" fill="#fbff00">RECON_001</text>
    <text x="18" y="80" class="mono" font-size="24" font-weight="900" fill="#050505">financial truth under concurrency</text>
    <text x="20" y="120" class="mono" font-size="15" font-weight="800" fill="#050505">kafka streams: bank / gateway / internal</text>
    <text x="20" y="150" class="mono" font-size="15" font-weight="800" fill="#050505">dedup key: UTR x RRN</text>
    <text x="20" y="180" class="mono" font-size="15" font-weight="800" fill="#050505">encryption: AES-256-GCM at ingestion</text>
    <text x="20" y="210" class="mono" font-size="15" font-weight="800" fill="#050505">plugins: add networks without core rewrite</text>
    <path d="M356 210C384 170 402 184 422 130C442 78 464 108 494 66" fill="none" stroke="#ff2bd6" stroke-width="8" class="dash" opacity=".62"/>
  </g>

  <g transform="translate(626 142)">
    <rect width="520" height="248" fill="#00e5ff" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="520" height="40" fill="#050505"/>
    <text x="18" y="27" class="mono" font-size="15" font-weight="900" fill="#00e5ff">DAEMON_4096</text>
    <text x="18" y="80" class="mono" font-size="24" font-weight="900" fill="#050505">OS telemetry without a cage</text>
    <text x="20" y="120" class="mono" font-size="15" font-weight="800" fill="#050505">psutil: browser / process / USB</text>
    <text x="20" y="150" class="mono" font-size="15" font-weight="800" fill="#050505">bounded queue with oldest-drop eviction</text>
    <text x="20" y="180" class="mono" font-size="15" font-weight="800" fill="#050505">SQLite buffer for network gaps</text>
    <text x="20" y="210" class="mono" font-size="15" font-weight="800" fill="#050505">WebSocket drains on reconnect</text>
    <g fill="#050505">
      <rect x="366" y="186" width="24" height="28"/>
      <rect x="402" y="150" width="24" height="64"/>
      <rect x="438" y="112" width="24" height="102"/>
      <rect x="474" y="74" width="24" height="140"/>
    </g>
  </g>

  <g transform="translate(54 442)">
    <rect width="520" height="248" fill="#ff2bd6" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="520" height="40" fill="#050505"/>
    <text x="18" y="27" class="mono" font-size="15" font-weight="900" fill="#ff2bd6">ROOMS_INDEX</text>
    <text x="18" y="80" class="mono" font-size="24" font-weight="900" fill="#050505">hackathon discovery machine</text>
    <text x="20" y="120" class="mono" font-size="15" font-weight="800" fill="#050505">Playwright scraper: 20-scroll lazy-load</text>
    <text x="20" y="150" class="mono" font-size="15" font-weight="800" fill="#050505">threaded Mongo writes keep API moving</text>
    <text x="20" y="180" class="mono" font-size="15" font-weight="800" fill="#050505">compound text index: name / event / desc</text>
    <text x="20" y="210" class="mono" font-size="15" font-weight="800" fill="#050505">group + private rooms with auth boundaries</text>
    <circle cx="392" cy="118" r="18" fill="#fbff00" stroke="#050505" stroke-width="6" class="pop"/>
    <circle cx="438" cy="154" r="18" fill="#1cff62" stroke="#050505" stroke-width="6" class="pop"/>
    <circle cx="474" cy="118" r="18" fill="#ffffff" stroke="#050505" stroke-width="6" class="pop"/>
    <path d="M392 118L438 154L474 118" fill="none" stroke="#050505" stroke-width="5"/>
  </g>

  <g transform="translate(626 442)">
    <rect width="520" height="248" fill="#1cff62" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="520" height="40" fill="#050505"/>
    <text x="18" y="27" class="mono" font-size="15" font-weight="900" fill="#1cff62">VISION_EDGE</text>
    <text x="18" y="80" class="mono" font-size="24" font-weight="900" fill="#050505">Gemini through edge functions</text>
    <text x="20" y="120" class="mono" font-size="15" font-weight="800" fill="#050505">inference in memory, no blob storage</text>
    <text x="20" y="150" class="mono" font-size="15" font-weight="800" fill="#050505">client-side downscale before payload</text>
    <text x="20" y="180" class="mono" font-size="15" font-weight="800" fill="#050505">JSON schema: name / confidence / info</text>
    <text x="20" y="210" class="mono" font-size="15" font-weight="800" fill="#050505">fewest moving parts, edge boundary intact</text>
    <path d="M368 208L424 118L482 208Z" fill="#ffffff" stroke="#050505" stroke-width="7"/>
    <circle cx="424" cy="170" r="22" fill="#00e5ff" stroke="#050505" stroke-width="7"/>
  </g>
</svg>
