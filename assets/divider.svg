<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 70" role="img" aria-labelledby="title desc">
  <title id="title">Terminal scanline divider</title>
  <desc id="desc">Animated phosphor divider with pixel ticks and a moving amber scanner.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace; }
      @keyframes sweep { 0% { transform: translateX(-180px); opacity: 0; } 12% { opacity: 1; } 70% { opacity: .9; } 100% { transform: translateX(1220px); opacity: 0; } }
      @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      .sweep { animation: sweep 4.8s linear infinite; }
      .pulse { animation: pulse 1.2s ease-in-out infinite; }
    </style>
    <pattern id="ticks" width="32" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="9" width="18" height="2" fill="#39ff14" opacity=".35"/>
    </pattern>
  </defs>

  <rect width="1200" height="70" fill="#0a0a0a"/>
  <rect x="0" y="24" width="1200" height="20" fill="url(#ticks)"/>
  <line x1="0" y1="34" x2="1200" y2="34" stroke="#39ff14" stroke-width="2" opacity=".8"/>
  <rect class="sweep" x="0" y="16" width="150" height="36" fill="#ffb000" opacity=".85"/>
  <text x="44" y="61" class="mono" font-size="12" font-weight="800" fill="#c8c8c8" opacity=".55">SYSTEM SEGMENT // CONTINUE SCROLLING</text>
  <circle cx="1138" cy="34" r="7" fill="#39ff14" class="pulse"/>
  <circle cx="1162" cy="34" r="7" fill="#ffb000" class="pulse"/>
</svg>
