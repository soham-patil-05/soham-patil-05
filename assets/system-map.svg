<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">System pressure map</title>
  <desc id="desc">A bright architecture board showing four build surfaces and the mechanisms used in each.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", "Cascadia Code", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; }
      @keyframes dash { to { stroke-dashoffset: -180; } }
      @keyframes pulse { 0%,100% { opacity: .65; } 50% { opacity: 1; } }
      .wire { stroke-dasharray: 20 12; animation: dash 4s linear infinite; }
      .lamp { animation: pulse 1.2s ease-in-out infinite; }
    </style>
    <pattern id="pin" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#050505" opacity=".28"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="#fffdf7"/>
  <rect width="1200" height="760" fill="url(#pin)"/>
  <path d="M0 0H438L0 332Z" fill="#ff2bd6"/>
  <path d="M1200 0V288L904 0Z" fill="#00e5ff"/>
  <path d="M0 760V545L404 760Z" fill="#1cff62"/>
  <path d="M1200 760H760L1200 505Z" fill="#fbff00"/>

  <g transform="translate(46 48)">
    <text x="0" y="48" class="heavy" font-size="52" fill="#050505">SYSTEM PRESSURE MAP</text>
    <text x="4" y="82" class="mono" font-size="16" font-weight="900" fill="#050505">architecture receipts / failure paths / sharp edges kept visible</text>
    <rect x="0" y="100" width="504" height="10" fill="#050505"/>
    <rect x="522" y="100" width="150" height="10" fill="#ff2bd6"/>
  </g>

  <g stroke="#050505" stroke-width="5" fill="none">
    <path d="M298 254C414 294 478 338 562 390" class="wire"/>
    <path d="M902 254C770 294 694 338 638 390" class="wire"/>
    <path d="M302 552C426 502 490 470 562 426" class="wire"/>
    <path d="M902 552C770 502 692 472 638 426" class="wire"/>
  </g>

  <g transform="translate(502 318)">
    <polygon points="98,0 196,98 98,196 0,98" fill="#050505" stroke="#ffffff" stroke-width="5"/>
    <text x="98" y="78" text-anchor="middle" class="mono" font-size="17" font-weight="900" fill="#fbff00">PROOF</text>
    <text x="98" y="106" text-anchor="middle" class="mono" font-size="28" font-weight="900" fill="#ffffff">&gt;</text>
    <text x="98" y="138" text-anchor="middle" class="mono" font-size="17" font-weight="900" fill="#00e5ff">CLAIMS</text>
  </g>

  <g transform="translate(62 164)">
    <rect width="430" height="184" fill="#fbff00" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="430" height="34" fill="#050505"/>
    <text x="18" y="24" class="mono" font-size="15" font-weight="900" fill="#fbff00">PAYMENT RECONCILIATION</text>
    <text x="18" y="69" class="mono" font-size="27" font-weight="900" fill="#050505">3 streams -&gt; 1 truth</text>
    <text x="20" y="104" class="mono" font-size="16" font-weight="800" fill="#050505">UTR x RRN double-hash</text>
    <text x="20" y="130" class="mono" font-size="16" font-weight="800" fill="#050505">Redis workers off main path</text>
    <text x="20" y="156" class="mono" font-size="16" font-weight="800" fill="#050505">AES-256-GCM at ingestion</text>
    <polyline points="280,146 304,116 328,126 354,84 382,96 410,54" fill="none" stroke="#ff2bd6" stroke-width="7"/>
  </g>

  <g transform="translate(708 164)">
    <rect width="430" height="184" fill="#00e5ff" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="430" height="34" fill="#050505"/>
    <text x="18" y="24" class="mono" font-size="15" font-weight="900" fill="#00e5ff">OS-LEVEL LAB DAEMON</text>
    <text x="18" y="69" class="mono" font-size="27" font-weight="900" fill="#050505">no VM / no privilege</text>
    <text x="20" y="104" class="mono" font-size="16" font-weight="800" fill="#050505">psutil + asyncio capture</text>
    <text x="20" y="130" class="mono" font-size="16" font-weight="800" fill="#050505">Queue(4096), oldest-drop</text>
    <text x="20" y="156" class="mono" font-size="16" font-weight="800" fill="#050505">SQLite buffer, WS drain</text>
    <g fill="#050505">
      <rect x="292" y="136" width="22" height="18"/>
      <rect x="324" y="112" width="22" height="42"/>
      <rect x="356" y="80" width="22" height="74"/>
      <rect x="388" y="54" width="22" height="100"/>
    </g>
  </g>

  <g transform="translate(62 488)">
    <rect width="430" height="184" fill="#ff2bd6" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="430" height="34" fill="#050505"/>
    <text x="18" y="24" class="mono" font-size="15" font-weight="900" fill="#ff2bd6">TEAM PLATFORM</text>
    <text x="18" y="69" class="mono" font-size="27" font-weight="900" fill="#050505">scrape / index / rooms</text>
    <text x="20" y="104" class="mono" font-size="16" font-weight="800" fill="#050505">Playwright 20-scroll lazy load</text>
    <text x="20" y="130" class="mono" font-size="16" font-weight="800" fill="#050505">compound Mongo text index</text>
    <text x="20" y="156" class="mono" font-size="16" font-weight="800" fill="#050505">Socket.IO + JWT boundary</text>
    <circle cx="346" cy="112" r="16" fill="#fbff00" stroke="#050505" stroke-width="5" class="lamp"/>
    <circle cx="388" cy="142" r="16" fill="#1cff62" stroke="#050505" stroke-width="5" class="lamp"/>
  </g>

  <g transform="translate(708 488)">
    <rect width="430" height="184" fill="#1cff62" stroke="#050505" stroke-width="6"/>
    <rect x="0" y="0" width="430" height="34" fill="#050505"/>
    <text x="18" y="24" class="mono" font-size="15" font-weight="900" fill="#1cff62">EDGE VISION PIPELINE</text>
    <text x="18" y="69" class="mono" font-size="27" font-weight="900" fill="#050505">inference, no backend</text>
    <text x="20" y="104" class="mono" font-size="16" font-weight="800" fill="#050505">Supabase edge functions</text>
    <text x="20" y="130" class="mono" font-size="16" font-weight="800" fill="#050505">client-side downscaling</text>
    <text x="20" y="156" class="mono" font-size="16" font-weight="800" fill="#050505">structured JSON output</text>
    <path d="M292 140L338 76L386 140Z" fill="#ffffff" stroke="#050505" stroke-width="5"/>
    <circle cx="338" cy="112" r="14" fill="#00e5ff" stroke="#050505" stroke-width="5"/>
  </g>
</svg>
