<svg viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg" width="900" height="120">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      @keyframes drawLine { from { stroke-dashoffset: 900; } to { stroke-dashoffset: 0; } }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .a1 { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
      .a2 { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.35s both; }
      .a3 { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.55s both; }
      .a4 { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.75s both; }
      .ln { stroke-dasharray: 900; animation: drawLine 1.8s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
      .cur { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="120" fill="#0d1117"/>

  <!-- subtle horizontal rule top -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#21262d" stroke-width="0.5"/>

  <!-- animated top rule -->
  <line x1="40" y1="24" x2="860" y2="24" stroke="#30363d" stroke-width="0.5" class="ln"/>

  <!-- name — large, stark, left-anchored -->
  <text x="40" y="72"
    class="mono a1"
    font-size="38"
    font-weight="700"
    fill="#e6edf3"
    letter-spacing="-0.5">soham patil<tspan class="cur" fill="#58a6ff">▋</tspan></text>

  <!-- thin descriptor line -->
  <text x="42" y="96"
    class="mono a2"
    font-size="11"
    font-weight="400"
    fill="#484f58"
    letter-spacing="3">DISTRIBUTED SYSTEMS  ·  AI AGENTS  ·  BACKEND INFRASTRUCTURE  ·  PICT</text>

  <!-- animated bottom rule -->
  <line x1="40" y1="112" x2="860" y2="112" stroke="#21262d" stroke-width="0.5" class="ln"/>

  <!-- right side: subtle commit hash aesthetic -->
  <text x="858" y="96"
    class="mono a4"
    font-size="10"
    font-weight="400"
    fill="#30363d"
    text-anchor="end"
    letter-spacing="1">9.14 · PICT-IT · 2027</text>

  <!-- bottom rule -->
  <line x1="0" y1="119" x2="900" y2="119" stroke="#21262d" stroke-width="0.5"/>
</svg>
