<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Soham Patil arcade runtime</title>
  <desc id="desc">Animated gaming themed profile hero with neon arcade cabinet, dialogue, scanlines, and moving tokens.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; letter-spacing: 1px; }
      @keyframes marquee { to { transform: translateX(-900px); } }
      @keyframes scan { 0% { transform: translateY(-120px); opacity: 0; } 15% { opacity: .35; } 100% { transform: translateY(760px); opacity: 0; } }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-13px); } }
      @keyframes blink { 0%, 48%, 100% { opacity: 1; } 49%, 70% { opacity: .12; } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .82; } 50% { transform: scale(1.12); opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -120; } }
      @keyframes line1 { 0%,18%{opacity:1} 20%,100%{opacity:0} }
      @keyframes line2 { 0%,23%{opacity:0} 25%,43%{opacity:1} 45%,100%{opacity:0} }
      @keyframes line3 { 0%,48%{opacity:0} 50%,68%{opacity:1} 70%,100%{opacity:0} }
      @keyframes line4 { 0%,73%{opacity:0} 75%,94%{opacity:1} 96%,100%{opacity:0} }
      .marquee { animation: marquee 10s linear infinite; }
      .scan { animation: scan 4.8s linear infinite; }
      .bob { animation: bob 2.2s ease-in-out infinite; }
      .blink { animation: blink 1s steps(1,end) infinite; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 1.5s ease-in-out infinite; }
      .dash { stroke-dasharray: 16 10; animation: dash 3s linear infinite; }
      .l1 { animation: line1 10s steps(1,end) infinite; }
      .l2 { animation: line2 10s steps(1,end) infinite; }
      .l3 { animation: line3 10s steps(1,end) infinite; }
      .l4 { animation: line4 10s steps(1,end) infinite; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#050505" stroke-width="1" opacity=".22"/>
      <path d="M0 20H40M20 0V40" fill="none" stroke="#050505" stroke-width=".7" opacity=".11"/>
    </pattern>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="3" fill="#050505" opacity=".13"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .14"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="#fbff00"/>
  <rect width="1200" height="680" fill="url(#grid)"/>
  <rect width="1200" height="680" fill="url(#scanlines)" opacity=".55"/>
  <rect width="1200" height="680" filter="url(#grain)"/>
  <path d="M0 0H1200V138L0 244Z" fill="#00e5ff"/>
  <path d="M1200 0V294L794 0Z" fill="#ff2bd6"/>
  <path d="M0 680V508L514 590L1200 472V680Z" fill="#050505"/>

  <g class="marquee">
    <text x="0" y="42" class="mono" font-size="20" font-weight="900" fill="#050505">PRESS START // BUILD MODE // CREATIVE ENGINE // TECH LOADOUT // CONTACT PORTALS //</text>
    <text x="900" y="42" class="mono" font-size="20" font-weight="900" fill="#050505">PRESS START // BUILD MODE // CREATIVE ENGINE // TECH LOADOUT // CONTACT PORTALS //</text>
    <text x="1800" y="42" class="mono" font-size="20" font-weight="900" fill="#050505">PRESS START // BUILD MODE // CREATIVE ENGINE // TECH LOADOUT // CONTACT PORTALS //</text>
  </g>

  <g transform="translate(58 96)">
    <rect x="0" y="0" width="526" height="42" fill="#050505"/>
    <rect x="14" y="12" width="114" height="18" fill="#1cff62"/>
    <text x="148" y="28" class="mono" font-size="16" font-weight="900" fill="#fbff00">arcade_runtime.load("soham")</text>
  </g>

  <g transform="translate(58 166)">
    <text x="12" y="90" class="heavy" font-size="126" fill="#00e5ff">SOHAM</text>
    <text x="0" y="78" class="heavy" font-size="126" fill="#050505">SOHAM</text>
    <text x="10" y="218" class="heavy" font-size="120" fill="#ff2bd6">PATIL</text>
    <text x="0" y="208" class="heavy" font-size="120" fill="none" stroke="#050505" stroke-width="5">PATIL</text>
    <text x="2" y="258" class="mono" font-size="21" font-weight="900" fill="#050505">creative systems // animated UI // automation</text>
    <rect x="0" y="286" width="566" height="18" fill="#050505"/>
    <rect x="0" y="312" width="186" height="16" fill="#ff2bd6"/>
    <rect x="202" y="312" width="170" height="16" fill="#00e5ff"/>
    <rect x="388" y="312" width="178" height="16" fill="#1cff62"/>
  </g>

  <g transform="translate(702 102)">
    <g class="bob">
      <polygon points="62,0 478,28 438,374 12,346" fill="#050505" stroke="#ffffff" stroke-width="6"/>
      <polygon points="88,38 444,58 412,304 54,286" fill="#111111" stroke="#fbff00" stroke-width="3"/>
      <rect x="112" y="78" width="284" height="36" fill="#ff2bd6"/>
      <text x="132" y="102" class="mono" font-size="18" font-weight="900" fill="#050505">DIALOGUE SYSTEM</text>
      <g class="mono" font-size="18" font-weight="900">
        <text x="94" y="162" fill="#ffffff" class="l1">&gt; sparks become working systems.</text>
        <text x="94" y="162" fill="#ffffff" class="l2">&gt; momentum beats perfect plans.</text>
        <text x="94" y="162" fill="#ffffff" class="l3">&gt; weird ideas prototype first.</text>
        <text x="94" y="162" fill="#ffffff" class="l4">&gt; good UI feels slightly alive.</text>
      </g>
      <text x="94" y="224" class="mono" font-size="16" font-weight="800" fill="#00e5ff">observe -&gt; invent -&gt; automate</text>
      <line x1="94" y1="246" x2="398" y2="246" stroke="#ff2bd6" stroke-width="4" class="dash"/>
      <text x="94" y="280" class="mono" font-size="15" font-weight="900" fill="#1cff62">cursor locked on curiosity</text>
      <rect x="350" y="264" width="22" height="22" fill="#fbff00" class="blink"/>
    </g>
  </g>

  <g transform="translate(84 526)" class="mono" font-weight="900">
    <rect x="0" y="0" width="202" height="82" fill="#fbff00" stroke="#050505" stroke-width="6"/>
    <text x="22" y="34" font-size="21" fill="#050505">CREATIVITY</text>
    <text x="22" y="62" font-size="15" fill="#050505">rare item equipped</text>
    <rect x="238" y="-20" width="206" height="102" fill="#ff2bd6" stroke="#050505" stroke-width="6"/>
    <text x="264" y="26" font-size="34" fill="#050505">TECH</text>
    <text x="264" y="60" font-size="15" fill="#050505">stack inventory</text>
    <rect x="478" y="0" width="220" height="82" fill="#00e5ff" stroke="#050505" stroke-width="6"/>
    <text x="504" y="34" font-size="21" fill="#050505">INNOVATION</text>
    <text x="504" y="62" font-size="15" fill="#050505">constant spawn</text>
  </g>

  <g transform="translate(945 515)">
    <circle cx="0" cy="0" r="18" fill="#fbff00" stroke="#050505" stroke-width="5" class="pulse"/>
    <circle cx="70" cy="42" r="18" fill="#00e5ff" stroke="#050505" stroke-width="5" class="pulse"/>
    <circle cx="136" cy="-8" r="18" fill="#1cff62" stroke="#050505" stroke-width="5" class="pulse"/>
    <path d="M0 0L70 42L136 -8" fill="none" stroke="#ffffff" stroke-width="4" class="dash"/>
  </g>

  <rect class="scan" x="0" y="0" width="1200" height="110" fill="#ffffff"/>
</svg>
