<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Soham Patil — Software Developer</title>
  <desc id="desc">Animated terminal header introducing Soham Patil, software developer from Pune, India.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; letter-spacing: 1px; }
      @keyframes flicker { 0%, 100% { opacity: 1; } 8% { opacity: .76; } 10% { opacity: 1; } 42% { opacity: .88; } 45% { opacity: 1; } }
      @keyframes scan { 0% { transform: translateY(-90px); opacity: 0; } 15% { opacity: .22; } 100% { transform: translateY(480px); opacity: 0; } }
      @keyframes cursor { 0%, 47%, 100% { opacity: 1; } 48%, 74% { opacity: 0; } }
      @keyframes boot1 { 0%, 100% { opacity: 1; } }
      @keyframes boot2 { 0%, 18% { opacity: 0; } 22%, 100% { opacity: 1; } }
      @keyframes boot3 { 0%, 28% { opacity: 0; } 32%, 100% { opacity: 1; } }
      @keyframes boot4 { 0%, 38% { opacity: 0; } 42%, 100% { opacity: 1; } }
      @keyframes pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
      .flicker { animation: flicker 4.2s steps(1,end) infinite; }
      .scan { animation: scan 4.4s linear infinite; }
      .cursor { animation: cursor 1s steps(1,end) infinite; }
      .b1 { animation: boot1 4s ease both; }
      .b2 { animation: boot2 4s ease both; }
      .b3 { animation: boot3 4s ease both; }
      .b4 { animation: boot4 4s ease both; }
      .pulse { animation: pulse 1.4s ease-in-out infinite; }
    </style>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#39ff14" stroke-width="1" opacity=".08"/>
    </pattern>
    <pattern id="lines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="2" fill="#39ff14" opacity=".08"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="nameClip">
      <rect x="56" y="150" width="760" height="120">
        <animate attributeName="width" from="760" to="760" dur="2.2s" begin="0s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="420" fill="#0a0a0a"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#lines)"/>
  <rect x="18" y="18" width="1164" height="384" fill="none" stroke="#39ff14" stroke-width="3" opacity=".8"/>
  <rect x="34" y="34" width="1132" height="352" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <g class="mono" font-size="18" font-weight="800">
    <text x="56" y="72" fill="#39ff14" class="b1">&gt; soham-patil --init --software-developer --pune-in</text>
    <text x="56" y="104" fill="#c8c8c8" class="b2">[OK] PICT — B.E. Information Technology // CGPA 9.142 // Pune, IN</text>
    <text x="56" y="136" fill="#ffb000" class="b3">[OK] arena.rank = LEETCODE_KNIGHT[1923] // DSA_SOLVED=600+</text>
    <text x="56" y="316" fill="#c8c8c8" class="b4">[ACTIVE] building systems that think, heal, and scale</text>
  </g>

  <text x="56" y="238" class="heavy" font-size="92" fill="#39ff14" opacity=".14">SOHAM PATIL</text>
  <g clip-path="url(#nameClip)" filter="url(#glow)" class="flicker">
    <text x="56" y="238" class="heavy" font-size="92" fill="#39ff14">SOHAM PATIL</text>
    <text x="61" y="244" class="heavy" font-size="92" fill="none" stroke="#ffb000" stroke-width="2" opacity=".55">SOHAM PATIL</text>
  </g>

  <rect x="808" y="165" width="26" height="92" fill="#39ff14" class="cursor"/>

  <g transform="translate(872 132)">
    <rect width="246" height="154" fill="#050505" stroke="#39ff14" stroke-width="3"/>
    <text x="20" y="38" class="mono" font-size="16" font-weight="900" fill="#ffb000">LIVE SIGNALS</text>
    <circle cx="28" cy="70" r="7" fill="#39ff14" class="pulse"/>
    <text x="46" y="76" class="mono" font-size="13" font-weight="800" fill="#c8c8c8">software developer</text>
    <circle cx="28" cy="102" r="7" fill="#39ff14" class="pulse"/>
    <text x="46" y="108" class="mono" font-size="13" font-weight="800" fill="#c8c8c8">open to connect</text>
    <circle cx="28" cy="134" r="7" fill="#ffb000" class="pulse"/>
    <text x="46" y="140" class="mono" font-size="13" font-weight="800" fill="#c8c8c8">always building</text>
  </g>

  <rect class="scan" x="0" y="0" width="1200" height="88" fill="#39ff14"/>
</svg>
