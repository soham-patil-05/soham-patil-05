<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 760" role="img" aria-labelledby="title desc">
  <title id="title">Creative engine loop</title>
  <desc id="desc">Animated game panel showing the continuous creative loop from idea to ship.</desc>
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace; }
      .heavy { font-family: "Arial Black", Impact, system-ui, sans-serif; }
      @keyframes dash { to { stroke-dashoffset: -190; } }
      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes meter { 0% { transform: scaleX(.25); } 45% { transform: scaleX(1); } 100% { transform: scaleX(.62); } }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }
      .dash { stroke-dasharray: 20 12; animation: dash 3s linear infinite; }
      .bob { animation: bob 2s ease-in-out infinite; }
      .meter { transform-box: fill-box; transform-origin: left center; animation: meter 3.5s ease-in-out infinite; }
      .blink { animation: blink 1.1s steps(1,end) infinite; }
    </style>
    <pattern id="tile" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-width="1" opacity=".08"/>
    </pattern>
  </defs>

  <rect width="620" height="760" fill="#050505"/>
  <rect width="620" height="760" fill="url(#tile)"/>
  <rect x="24" y="24" width="572" height="712" fill="none" stroke="#ffffff" stroke-width="5"/>
  <rect x="42" y="42" width="536" height="74" fill="#ff2bd6"/>
  <text x="64" y="90" class="heavy" font-size="38" fill="#050505">CREATIVE ENGINE</text>

  <g transform="translate(310 334)">
    <circle cx="0" cy="0" r="190" fill="none" stroke="#ffffff" stroke-width="3" opacity=".55" class="dash"/>
    <path d="M0 -172C102 -150 164 -88 172 0C150 102 88 164 0 172C-102 150 -164 88 -172 0C-150 -102 -88 -164 0 -172Z" fill="#111111" stroke="#fbff00" stroke-width="5"/>
    <text x="0" y="-146" text-anchor="middle" class="mono" font-size="19" font-weight="900" fill="#fbff00">IDEA</text>
    <text x="144" y="8" text-anchor="middle" class="mono" font-size="19" font-weight="900" fill="#00e5ff">PROTO</text>
    <text x="0" y="156" text-anchor="middle" class="mono" font-size="19" font-weight="900" fill="#1cff62">SHIP</text>
    <text x="-146" y="8" text-anchor="middle" class="mono" font-size="19" font-weight="900" fill="#ff2bd6">BREAK</text>
    <text x="0" y="-10" text-anchor="middle" class="mono" font-size="24" font-weight="900" fill="#ffffff">LOOP</text>
    <text x="0" y="24" text-anchor="middle" class="mono" font-size="14" font-weight="900" fill="#00e5ff">repeat until alive</text>
  </g>

  <g transform="translate(268 214)">
    <g class="bob">
      <rect x="0" y="0" width="86" height="70" fill="#fbff00" stroke="#050505" stroke-width="5"/>
      <rect x="18" y="-24" width="50" height="28" fill="#00e5ff" stroke="#050505" stroke-width="5"/>
      <rect x="24" y="20" width="14" height="14" fill="#050505"/>
      <rect x="52" y="20" width="14" height="14" fill="#050505"/>
      <rect x="24" y="48" width="42" height="8" fill="#050505"/>
    </g>
  </g>

  <g class="mono" font-weight="900">
    <g transform="translate(62 572)">
      <text x="0" y="0" font-size="16" fill="#ffffff">psychology hooks</text>
      <line x1="0" y1="18" x2="496" y2="18" stroke="#00e5ff" stroke-width="4"/>
      <rect x="0" y="46" width="496" height="34" fill="#ffffff"/><rect x="0" y="46" width="386" height="34" fill="#fbff00" class="meter"/><text x="16" y="69" font-size="15" fill="#050505">motion gives the eye a route</text>
      <rect x="0" y="98" width="496" height="34" fill="#ffffff"/><rect x="0" y="98" width="430" height="34" fill="#ff2bd6" class="meter"/><text x="16" y="121" font-size="15" fill="#050505">contrast makes the page memorable</text>
      <rect x="0" y="150" width="496" height="34" fill="#ffffff"/><rect x="0" y="150" width="350" height="34" fill="#1cff62" class="meter"/><text x="16" y="173" font-size="15" fill="#050505">loops reward one more glance</text>
    </g>
  </g>

  <rect x="536" y="58" width="20" height="20" fill="#fbff00" class="blink"/>
</svg>
